{% extends 'base.html' %}
{% block title %}Reject Application — LuxeStay Admin{% endblock %}

{% block content %}
<div class="container" style="max-width:540px; margin:4rem auto;">
    <div style="border:1px solid #eee; border-top:4px solid #dc3545;">
        <div style="background:var(--dark); padding:2rem;">
            <h4 class="text-white mb-0" style="font-family:'Playfair Display',serif;">
                <i class="bi bi-x-circle text-danger me-2"></i>Reject Application
            </h4>
        </div>
        <div class="p-4">
            <p>You are rejecting <strong>{{ profile.user.get_full_name|default:profile.user.username }}</strong>'s hotel owner application.</p>
            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label small filter-panel-title">Reason for Rejection (optional — shown to the applicant)</label>
                    <textarea name="reason" class="form-control" rows="4"
                        placeholder="e.g. Insufficient information provided. Please reapply with valid business registration details."></textarea>
                </div>
                <div class="d-flex gap-3">
                    <button type="submit" class="btn btn-danger" style="border-radius:0;">Confirm Rejection</button>
                    <a href="{% url 'owner_approval_list' %}" class="btn btn-outline-secondary" style="border-radius:0;">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
